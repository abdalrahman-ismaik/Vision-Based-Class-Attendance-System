<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision‑based Class Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            background: #4CAF50;
            color: white;
            margin: 0;
            padding: 1em;
            width: 100%;
            text-align: center;
        }
        #video-container {
            margin-top: 1em;
            background: #000;
            padding: 0;
            border: 4px solid #333;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Vision‑based Class Attendance</h1>
    <div id="video-container">
        <img src="{{ url_for('video_feed') }}" alt="Video feed"/>
    </div>
    <p style="margin-top: 1em; color: #555;">This demonstration highlights detected faces and displays recognised names.  Unknown faces are labelled accordingly.</p>
</body>
</html>
